name: Deploy

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Git tag to (re)deploy, e.g. v1.2.3 — for rollback"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.version_tag }}
    steps:
      - name: Validate ref format
        env:
          REF: ${{ inputs.version || github.ref_name }}
        run: |
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::ref '$REF' is not a valid vMAJOR.MINOR.PATCH tag — refusing to deploy an arbitrary ref"
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Resolve commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ inputs.version || github.ref_name }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          # Lowercase the repository owner name as GHCR requires lowercase tags
          OWNER_LOWER=$(echo "$OWNER" | tr '[:lower:]' '[:upper:]' | tr '[:upper:]' '[:lower:]')
          echo "version_tag=ghcr.io/${OWNER_LOWER}/eventgo:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=ghcr.io/${OWNER_LOWER}/eventgo:${SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.version_tag }}
            ${{ steps.image.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: /home/${{ secrets.VPS_USER }}/eventgo
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Verify app directory exists
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_DIR
          script: |
            mkdir -p "$DEPLOY_DIR"
            if [ ! -d "$DEPLOY_DIR" ] || [ ! -w "$DEPLOY_DIR" ]; then
              echo "::error::$DEPLOY_DIR is missing or not writable by $(whoami)."
              exit 1
            fi

      - name: Copy docker-compose.production.yml to VPS
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.production.yml"
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          CONTAINER: eventgo
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,CONTAINER,GHCR_TOKEN,GH_ACTOR,DEPLOY_DIR
          script: |
            set -euo pipefail

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            cd "$DEPLOY_DIR"

            LEGACY_ENV_FILE="/opt/eventgo/.env.production"

            # If this is a fresh deploy directory, reuse the old production env
            # so we keep the existing database password and app secrets.
            if [ ! -f .env.production ] && [ -f "$LEGACY_ENV_FILE" ]; then
              cp "$LEGACY_ENV_FILE" .env.production
            fi

            # Initialize .env.production only when there is no legacy file to reuse.
            if [ ! -f .env.production ]; then
              echo "Creating fresh .env.production file. Please configure the environment variables!"
              echo "EVENTGO_IMAGE=${IMAGE}" > .env.production
              echo "POSTGRES_PASSWORD=change_me_to_a_strong_password" >> .env.production
              echo "ADMIN_PASSWORD=change_me_to_a_strong_password" >> .env.production
              echo "JWT_SECRET=change_me_to_a_strong_secret" >> .env.production
            fi

            # Always keep the current image tag in sync with the deployed version.
            if grep -q "EVENTGO_IMAGE=" .env.production; then
              sed -i "s|^EVENTGO_IMAGE=.*|EVENTGO_IMAGE=${IMAGE}|" .env.production
            else
              echo "EVENTGO_IMAGE=${IMAGE}" >> .env.production
            fi

            docker compose -f docker-compose.production.yml --env-file .env.production pull eventgo
            docker compose -f docker-compose.production.yml --env-file .env.production up -d

            # Make sure the schema is applied before serving traffic.
            docker compose -f docker-compose.production.yml --env-file .env.production exec -T eventgo npx prisma migrate deploy

            echo "Waiting for $CONTAINER to become healthy..."
            sleep 5
            if docker ps --format '{{.Names}}' | grep -q "^${CONTAINER}$"; then
              echo "$CONTAINER is running successfully."
            else
              echo "Error: $CONTAINER is not running."
              docker logs --tail 100 "$CONTAINER"
              exit 1
            fi

            docker image prune -f --filter until=72h
