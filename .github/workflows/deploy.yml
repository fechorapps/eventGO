name: Deploy

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Git tag to (re)deploy, e.g. v1.2.3 — for rollback"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.version_tag }}
    steps:
      - name: Validate ref format
        env:
          REF: ${{ inputs.version || github.ref_name }}
        run: |
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::ref '$REF' is not a valid vMAJOR.MINOR.PATCH tag — refusing to deploy an arbitrary ref"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Resolve commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ inputs.version || github.ref_name }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          # Lowercase the repository owner name as GHCR requires lowercase tags
          OWNER_LOWER=$(echo "$OWNER" | tr '[:lower:]' '[:upper:]' | tr '[:upper:]' '[:lower:]')
          echo "version_tag=ghcr.io/${OWNER_LOWER}/eventgo:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=ghcr.io/${OWNER_LOWER}/eventgo:${SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.version_tag }}
            ${{ steps.image.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref_name }}

      - name: Create app directory and copy files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/eventgo
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /opt/eventgo

      - name: Copy docker-compose.production.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "/opt/eventgo"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          CONTAINER: eventgo
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,CONTAINER,GHCR_TOKEN,GH_ACTOR
          script: |
            set -euo pipefail

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            cd /opt/eventgo
            
            # Initialize .env.production if it doesn't exist
            if [ ! -f .env.production ]; then
              echo "Creating fresh .env.production file. Please configure the environment variables!"
              echo "EVENTGO_IMAGE=${IMAGE}" > .env.production
              echo "POSTGRES_PASSWORD=change_me_to_a_strong_password" >> .env.production
              echo "ADMIN_PASSWORD=change_me_to_a_strong_password" >> .env.production
              echo "JWT_SECRET=change_me_to_a_strong_secret" >> .env.production
            else
              # Update image tag
              if grep -q "EVENTGO_IMAGE=" .env.production; then
                sed -i "s|^EVENTGO_IMAGE=.*|EVENTGO_IMAGE=${IMAGE}|" .env.production
              else
                echo "EVENTGO_IMAGE=${IMAGE}" >> .env.production
              fi
            fi

            docker compose -f docker-compose.production.yml --env-file .env.production pull eventgo
            docker compose -f docker-compose.production.yml --env-file .env.production up -d

            echo "Waiting for $CONTAINER to become healthy..."
            sleep 5
            if docker ps --format '{{.Names}}' | grep -q "^${CONTAINER}$"; then
              echo "$CONTAINER is running successfully."
            else
              echo "Error: $CONTAINER is not running."
              docker logs --tail 100 "$CONTAINER"
              exit 1
            fi

            docker image prune -f --filter until=72h
